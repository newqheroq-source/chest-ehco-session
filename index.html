<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chest Echo 課程報名系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://lucide.dev/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .form-input { @apply w-full bg-slate-800 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 transition-all text-white; }
        .form-label { @apply text-sm font-medium text-slate-400 mb-2 block; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen pb-20">

    <!-- Header -->
    <header class="relative h-48 bg-slate-900 flex items-center justify-center border-b border-white/5 overflow-hidden">
        <div class="absolute inset-0 opacity-20 bg-[radial-gradient(circle_at_50%_50%,#06b6d4,transparent_70%)]"></div>
        <div class="relative text-center z-10">
            <h1 class="text-3xl md:text-4xl font-black text-white mb-2">Chest Echo 實作工作坊</h1>
            <p class="text-slate-400 text-sm">請填寫報名資訊與課前預習問卷</p>
        </div>
    </header>

    <main class="max-w-3xl mx-auto mt-10 px-4">
        <form id="registrationForm" class="space-y-8">
            
            <!-- A. 基本資料 -->
            <section class="bg-slate-900/50 border border-white/5 rounded-3xl p-6 md:p-8 backdrop-blur-sm">
                <h3 class="text-xl font-bold text-cyan-400 mb-6 flex items-center gap-2">
                    <i data-lucide="user" class="w-5 h-5"></i> 基本資料
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="form-label">姓名</label>
                        <input type="text" name="name" required class="form-input" placeholder="請輸入姓名">
                    </div>
                    <div>
                        <label class="form-label">人事號</label>
                        <input type="text" name="empId" required class="form-input" placeholder="請輸入人事號">
                    </div>
                    <div>
                        <label class="form-label">目前身份</label>
                        <select name="identity" required class="form-input bg-slate-800">
                            <option value="">請選擇</option>
                            <option value="PGY1">PGY1</option>
                            <option value="PGY2">PGY2</option>
                            <option value="R1">R1</option>
                            <option value="R2">R2</option>
                            <option value="R3">R3</option>
                            <option value="Fellow">Fellow</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">訓練經驗</label>
                        <select name="priorTraining" required class="form-input bg-slate-800">
                            <option value="">請選擇</option>
                            <option value="無">無</option>
                            <option value="1 次">1 次</option>
                            <option value="2-5 次">2-5 次</option>
                            <option value=">5 次">>5 次</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- B. 技能自評 (對應 I 欄邏輯) -->
            <section class="bg-slate-900/50 border border-white/5 rounded-3xl p-6 md:p-8">
                <h3 class="text-xl font-bold text-cyan-400 mb-6 flex items-center gap-2">
                    <i data-lucide="activity" class="w-5 h-5"></i> 核心技能自評
                </h3>
                <div class="space-y-6">
                    <div>
                        <label class="form-label">Echo 引導處置能力 (穿刺/置管)</label>
                        <select name="skillProcedure" id="skillProcedure" required class="form-input bg-slate-800">
                            <option value="從未看過">從未看過 (將標註紅色提醒助教)</option>
                            <option value="指導下操作過">指導下操作過</option>
                            <option value="可獨立完成">可獨立完成</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">實作梯次選擇 (可複選)</label>
                        <div class="grid grid-cols-2 gap-3" id="dateCheckboxes">
                            <label class="flex items-center gap-2 bg-slate-800 p-3 rounded-lg cursor-pointer">
                                <input type="checkbox" name="dates" value="3/11"> 3/11
                            </label>
                            <label class="flex items-center gap-2 bg-slate-800 p-3 rounded-lg cursor-pointer">
                                <input type="checkbox" name="dates" value="3/12"> 3/12
                            </label>
                            <label class="flex items-center gap-2 bg-slate-800 p-3 rounded-lg cursor-pointer">
                                <input type="checkbox" name="dates" value="3/18"> 3/18
                            </label>
                            <label class="flex items-center gap-2 bg-slate-800 p-3 rounded-lg cursor-pointer">
                                <input type="checkbox" name="dates" value="3/19"> 3/19
                            </label>
                        </div>
                    </div>
                </div>
            </section>

            <!-- C. AI 預習建議 -->
            <section class="bg-indigo-500/5 border border-indigo-500/20 rounded-3xl p-6 md:p-8">
                <h3 class="text-xl font-bold text-indigo-400 mb-4 flex items-center gap-2">
                    <i data-lucide="sparkles" class="w-5 h-5"></i> AI 個人化預習指引
                </h3>
                <div class="space-y-4">
                    <label class="form-label">您的學習期待？</label>
                    <textarea id="expectations" name="expectations" rows="3" class="form-input resize-none" placeholder="例如：想學會辨識 B-line..."></textarea>
                    
                    <button type="button" id="aiBtn" class="flex items-center gap-2 px-6 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-full font-bold transition-all disabled:opacity-50">
                        <i data-lucide="wand-2" class="w-4 h-4"></i> 獲取 AI 建議
                    </button>

                    <div id="aiResponse" class="hidden mt-4 p-4 bg-slate-900/80 border border-indigo-500/30 rounded-xl text-sm text-slate-300 whitespace-pre-wrap"></div>
                    <input type="hidden" name="aiSuggestion" id="aiSuggestionHidden">
                </div>
            </section>

            <!-- Submit -->
            <div class="pt-6">
                <button type="submit" id="submitBtn" class="w-full py-4 bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-black text-lg rounded-2xl shadow-xl transition-all flex items-center justify-center gap-2">
                    送出報名資料
                </button>
            </div>
        </form>

        <div id="successMsg" class="hidden text-center py-20 animate-in fade-in zoom-in">
            <i data-lucide="check-circle" class="w-20 h-20 text-green-400 mx-auto mb-4"></i>
            <h2 class="text-3xl font-bold text-white mb-2">提交成功！</h2>
            <p class="text-slate-400">您的資料已成功寫入試算表。</p>
        </div>
    </main>

    <script>
        // 初始化圖示
        lucide.createIcons();

        // 請替換為您部署 GAS 後獲得的 Web App URL
        const GAS_URL = "YOUR_GAS_DEPLOYMENT_URL"; 
        const GEMINI_API_KEY = ""; // 環境提供

        // AI 生成邏輯
        document.getElementById('aiBtn').addEventListener('click', async () => {
            const btn = document.getElementById('aiBtn');
            const exp = document.getElementById('expectations').value;
            const identity = document.querySelector('[name="identity"]').value;

            if (!exp || !identity) {
                alert("請先填寫身份與學習期待");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = "分析中...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `我是一位 ${identity} 醫師，我對 Chest Echo 的期待是：${exp}。請給我簡短的預習建議。` }] }]
                    })
                });
                const result = await response.json();
                const text = result.candidates[0].content.parts[0].text;
                
                document.getElementById('aiResponse').classList.remove('hidden');
                document.getElementById('aiResponse').innerText = text;
                document.getElementById('aiSuggestionHidden').value = text;
            } catch (err) {
                alert("AI 生成失敗，請再試一次");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="wand-2" class="w-4 h-4"></i> 重新生成建議`;
                lucide.createIcons();
            }
        });

        // 表單提交邏輯
        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = "傳送中...";

            const formData = new FormData(e.target);
            const dates = [];
            document.querySelectorAll('[name="dates"]:checked').forEach(el => dates.push(el.value));

            // 建構符合 GAS doPost 預期的 JSON 物件
            const payload = {
                name: formData.get('name'),
                empId: formData.get('empId'),
                identity: formData.get('identity'),
                priorTraining: formData.get('priorTraining'),
                skills: {
                    pneumothorax: "未填寫", // 簡化處理
                    pleuralEffusion: "未填寫",
                    pathology: "未填寫",
                    procedure: formData.get('skillProcedure') // 關鍵欄位 (I 欄)
                },
                preferredDates: dates,
                selfEfficacy: {
                    probeSelection: 3, imageRecognition: 3, proactiveUse: 3, clinicalDecision: 3
                },
                motivation: ["提升臨床能力"],
                expectations: formData.get('expectations'),
                aiSuggestion: formData.get('aiSuggestion')
            };

            try {
                // 使用 fetch 發送到 GAS
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors', // GAS Web App 通常需要 no-cors 或特殊處理
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                document.getElementById('registrationForm').classList.add('hidden');
                document.getElementById('successMsg').classList.remove('hidden');
            } catch (err) {
                alert("提交失敗，請檢查網路或 GAS 網址是否正確。");
                btn.disabled = false;
                btn.innerText = "重新送出";
            }
        });
    </script>
</body>
</html>
