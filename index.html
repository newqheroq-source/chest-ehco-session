<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chest Echo 課程報名系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 修正 Lucide 圖示庫引入方式 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .form-input { @apply w-full bg-slate-800 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 transition-all text-white; }
        .form-label { @apply text-sm font-medium text-slate-400 mb-2 block; }
        .checkbox-card { @apply flex items-center gap-2 bg-slate-800 p-3 rounded-lg cursor-pointer hover:bg-slate-700 transition-colors border border-transparent; }
        .checkbox-card:has(input:checked) { @apply border-cyan-500 bg-cyan-500/10; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen pb-20">

    <!-- Header -->
    <header class="relative h-48 bg-slate-900 flex items-center justify-center border-b border-white/5 overflow-hidden">
        <div class="absolute inset-0 opacity-20 bg-[radial-gradient(circle_at_50%_50%,#06b6d4,transparent_70%)]"></div>
        <div class="relative text-center z-10 px-4">
            <h1 class="text-3xl md:text-4xl font-black text-white mb-2">Chest Echo 實作工作坊</h1>
            <p class="text-slate-400 text-sm">請填寫報名資訊與課前預習問卷</p>
        </div>
    </header>

    <main class="max-w-3xl mx-auto mt-10 px-4">
        <form id="registrationForm" class="space-y-8">
            
            <!-- A. 基本資料 -->
            <section class="bg-slate-900/50 border border-white/5 rounded-3xl p-6 md:p-8 backdrop-blur-sm">
                <h3 class="text-xl font-bold text-cyan-400 mb-6 flex items-center gap-2">
                    <i data-lucide="user" class="w-5 h-5"></i> 基本資料
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="form-label">姓名</label>
                        <input type="text" name="name" required class="form-input" placeholder="請輸入姓名">
                    </div>
                    <div>
                        <label class="form-label">人事號</label>
                        <input type="text" name="empId" required class="form-input" placeholder="請輸入人事號">
                    </div>
                    <div>
                        <label class="form-label">目前身份</label>
                        <select name="identity" required class="form-input bg-slate-800">
                            <option value="">請選擇</option>
                            <option value="PGY1">PGY1</option>
                            <option value="PGY2">PGY2</option>
                            <option value="R1">R1</option>
                            <option value="R2">R2</option>
                            <option value="R3">R3</option>
                            <option value="Fellow">Fellow</option>
                            <option value="VS">VS 主治醫師</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">訓練經驗</label>
                        <select name="priorTraining" required class="form-input bg-slate-800">
                            <option value="">請選擇</option>
                            <option value="無">無相關經驗</option>
                            <option value="1 次">看過/操作過 1 次</option>
                            <option value="2-5 次">操作過 2-5 次</option>
                            <option value=">5 次">操作超過 5 次</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- B. 技能自評 -->
            <section class="bg-slate-900/50 border border-white/5 rounded-3xl p-6 md:p-8">
                <h3 class="text-xl font-bold text-cyan-400 mb-6 flex items-center gap-2">
                    <i data-lucide="activity" class="w-5 h-5"></i> 核心技能自評
                </h3>
                <div class="space-y-6">
                    <div>
                        <label class="form-label">Echo 引導處置能力 (穿刺/置管)</label>
                        <select name="skillProcedure" id="skillProcedure" required class="form-input bg-slate-800">
                            <option value="從未看過">從未看過 (將標註紅色提醒助教)</option>
                            <option value="指導下操作過">指導下操作過</option>
                            <option value="可獨立完成">可獨立完成</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">實作梯次選擇 (可複選)</label>
                        <div class="grid grid-cols-2 gap-3" id="dateCheckboxes">
                            <label class="checkbox-card">
                                <input type="checkbox" name="dates" value="3/11" class="accent-cyan-500"> 3/11 (一)
                            </label>
                            <label class="checkbox-card">
                                <input type="checkbox" name="dates" value="3/12" class="accent-cyan-500"> 3/12 (二)
                            </label>
                            <label class="checkbox-card">
                                <input type="checkbox" name="dates" value="3/18" class="accent-cyan-500"> 3/18 (一)
                            </label>
                            <label class="checkbox-card">
                                <input type="checkbox" name="dates" value="3/19" class="accent-cyan-500"> 3/19 (二)
                            </label>
                        </div>
                    </div>
                </div>
            </section>

            <!-- C. AI 預習建議 -->
            <section class="bg-indigo-500/5 border border-indigo-500/20 rounded-3xl p-6 md:p-8">
                <h3 class="text-xl font-bold text-indigo-400 mb-4 flex items-center gap-2">
                    <i data-lucide="sparkles" class="w-5 h-5"></i> AI 個人化預習指引
                </h3>
                <div class="space-y-4">
                    <label class="form-label">您的學習期待？</label>
                    <textarea id="expectations" name="expectations" rows="3" class="form-input resize-none" placeholder="例如：想學會辨識 B-line 或 Pigtail 置放技巧..."></textarea>
                    
                    <button type="button" id="aiBtn" class="flex items-center gap-2 px-6 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-full font-bold transition-all disabled:opacity-50 shadow-lg shadow-indigo-500/20">
                        <i data-lucide="wand-2" class="w-4 h-4"></i> 獲取 AI 預習建議
                    </button>

                    <div id="aiResponse" class="hidden mt-4 p-5 bg-slate-900/80 border border-indigo-500/30 rounded-xl text-sm text-slate-300 leading-relaxed whitespace-pre-wrap"></div>
                    <input type="hidden" name="aiSuggestion" id="aiSuggestionHidden">
                </div>
            </section>

            <!-- Submit -->
            <div class="pt-6">
                <button type="submit" id="submitBtn" class="w-full py-4 bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-black text-lg rounded-2xl shadow-xl transition-all flex items-center justify-center gap-2">
                    送出報名資料
                </button>
            </div>
        </form>

        <div id="successMsg" class="hidden text-center py-20 animate-in fade-in zoom-in duration-500">
            <div class="inline-flex items-center justify-center w-24 h-24 bg-green-500/20 rounded-full mb-6">
                <i data-lucide="check-circle" class="w-12 h-12 text-green-400"></i>
            </div>
            <h2 class="text-3xl font-bold text-white mb-2">提交成功！</h2>
            <p class="text-slate-400 max-w-xs mx-auto">您的資料已成功寫入試算表，請準時參加課程。</p>
            <button onclick="location.reload()" class="mt-8 text-cyan-400 underline underline-offset-4 hover:text-cyan-300">再次填寫</button>
        </div>
    </main>

    <script>
        // 確保 Lucide 載入後再執行圖示初始化
        function initIcons() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            } else {
                // 如果尚未載入則稍候再試
                setTimeout(initIcons, 100);
            }
        }

        // 當頁面載入完成
        window.addEventListener('DOMContentLoaded', initIcons);

        // 您的 Google Apps Script 部署 URL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzdwV-cif3ll68HfgtZ3NMcqBFM-7QRxgmEx7_MTkDycwfnAw3_W8DNhgVzbdyvUXpe/exec"; 
        const API_KEY = ""; // 環境自動提供

        // AI 生成邏輯
        document.getElementById('aiBtn').addEventListener('click', async () => {
            const btn = document.getElementById('aiBtn');
            const exp = document.getElementById('expectations').value;
            const identity = document.querySelector('[name="identity"]').value;

            if (!exp || !identity) {
                alert("請填寫您的「身份」與「學習期待」，AI 才能為您提供建議。");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<i class="animate-spin w-4 h-4 border-2 border-white/30 border-t-white rounded-full"></i> 分析中...`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `你是一位臨床超音波教學專家。我是一位 ${identity} 醫師，我對 Chest Echo 課程的期待是：${exp}。請給我 3 個簡短且具體的課前預習建議，並保持專業親切。` }] }]
                    })
                });
                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text || "暫時無法產生建議，請稍後再試。";
                
                document.getElementById('aiResponse').classList.remove('hidden');
                document.getElementById('aiResponse').innerText = text;
                document.getElementById('aiSuggestionHidden').value = text;
            } catch (err) {
                console.error(err);
                alert("AI 建議服務暫時不可用。");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="wand-2" class="w-4 h-4"></i> 重新生成建議`;
                initIcons();
            }
        });

        // 表單提交邏輯
        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const checkedDates = document.querySelectorAll('[name="dates"]:checked');
            if (checkedDates.length === 0) {
                alert("請至少選擇一個實作梯次。");
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = `<i class="animate-spin w-5 h-5 border-2 border-white/30 border-t-white rounded-full"></i> 資料寫入中...`;

            const formData = new FormData(e.target);
            const dates = Array.from(checkedDates).map(el => el.value);

            const payload = {
                name: formData.get('name'),
                empId: formData.get('empId'),
                identity: formData.get('identity'),
                priorTraining: formData.get('priorTraining'),
                skills: {
                    pneumothorax: "未測量", 
                    pleuralEffusion: "未測量",
                    pathology: "未測量",
                    procedure: formData.get('skillProcedure') 
                },
                preferredDates: dates,
                selfEfficacy: {
                    probeSelection: 3, 
                    imageRecognition: 3, 
                    proactiveUse: 3, 
                    clinicalDecision: 3
                },
                motivation: ["提升臨床診斷效率"],
                expectations: formData.get('expectations'),
                aiSuggestion: formData.get('aiSuggestion') || "學員未產生建議"
            };

            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                document.getElementById('registrationForm').classList.add('hidden');
                document.getElementById('successMsg').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (err) {
                console.error(err);
                alert("提交失敗，請檢查網路連線或聯繫管理員。");
                btn.disabled = false;
                btn.innerText = "重新送出報名資料";
            }
        });
    </script>
</body>
</html>
